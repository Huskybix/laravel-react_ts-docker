name: Deploy
on:
  push:
    branches: [main]
defaults:
  run:
    working-directory: src
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build assets
        run: npm run build
      - name: Copy assets to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "src/public/build"
          target: "/var/www/docker-laravel"
      - name: Set production env vars
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /var/www/docker-laravel/src
            sed -i 's|APP_URL=.*|APP_URL=${{ secrets.APP_URL }}|' .env
            sed -i 's|APP_ENV=.*|APP_ENV=${{ secrets.APP_ENV }}|' .env
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /var/www/docker-laravel
            git pull origin main
            docker compose -f docker-compose.prod.yml exec app php artisan ziggy:generate
            docker compose -f docker-compose.prod.yml exec app php artisan migrate --force
            docker compose -f docker-compose.prod.yml exec app php artisan config:clear
            docker compose -f docker-compose.prod.yml exec app php artisan route:clear
            docker compose -f docker-compose.prod.yml exec app php artisan cache:clear